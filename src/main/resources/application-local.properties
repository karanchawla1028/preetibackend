# THIS FILE IS AUTOMATICALLY LOADED WHEN YOU RUN WITH "local" PROFILE

# Activate the profile (important!)
spring.profiles.active=local

# LOCAL DATABASE ? change password if yours is different
spring.datasource.url=jdbc:mysql://localhost:3306/preetinest?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root        # ? change only if your local MySQL uses another password
# spring.datasource.password=          # ? uncomment this line if you have NO password

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Helpful during development
spring.jpa.show-sql=true

# Fake AWS keys for local (safe)
aws.accessKey=test
aws.secretKey=test
app.s3.base-url=http://localhost:8080/local-s3/